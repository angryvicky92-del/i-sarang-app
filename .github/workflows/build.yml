name: Build Android
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-path: app/package-lock.json

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Android Licenses
        working-directory: app
        run: yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses || true

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-cache: true
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: app
        run: npm install

      - name: Build Android AAB (Free Local Build with High Memory)
        working-directory: app
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m"
        run: |
          # Added --clear-cache and --verbose for debugging
          npx eas-cli build --platform android --profile production --local --non-interactive --clear-cache --verbose --output=./uljip_check_v2.aab

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-app-bundle
          path: app/uljip_check_v2.aab
